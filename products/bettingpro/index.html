<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>BettingPro — Sports Betting Calculator</title>
  <link rel="stylesheet" href="css/style.css?v=1775421661">
</head>
<body>
  <div class="container">
    <header>
      <h1>BettingPro</h1>
      <p class="subtitle">Sports Betting Probability Calculator</p>
    </header>

    <!-- Update Bar -->
    <section class="card update-data-bar">
      <div class="update-controls">
        <span id="last-update" class="last-update"></span>
        <span id="update-btn-wrapper" class="update-btn-wrapper" title="Data is fresh (less than 6 hours old)"><button id="update-data-btn" class="update-btn" disabled>Update Data</button></span>
      </div>
      <div id="update-status" class="update-status hidden">
        <span class="spinner"></span>
        <span id="update-message">Updating...</span>
      </div>
    </section>

    <!-- Selector Bar -->
    <section class="card selector-bar">
      <div class="selector-row">
        <label>Sport
          <select id="sport-select">
            <option value="football">Football</option>
          </select>
        </label>
        <label>League
          <select id="league-select"></select>
        </label>
        <label class="season-label">Season
          <select id="season-select"></select>
        </label>
        <label>Bookmaker
          <select id="bookmaker-select">
            <option value="veikkaus">Veikkaus</option>
          </select>
        </label>
      </div>
    </section>

    <!-- Match List -->
    <section class="card">
      <h2>Matches</h2>
      <div id="match-list" class="match-list">
        <p class="muted">Loading...</p>
      </div>
    </section>

    <!-- Results (hidden until match clicked) -->
    <div id="results" class="results hidden">

      <!-- Selected Match Info -->
      <section class="card">
        <div class="results-header">
          <h2 id="selected-match-title">Match Analysis</h2>
          <div class="results-header-actions">
            <button id="recalculate-btn" class="recalc-btn" disabled title="Adjust settings above, then recalculate">Recalculate</button>
            <button id="close-results" class="close-btn" title="Close">&times;</button>
          </div>
        </div>
      </section>

      <!-- Score Matrix -->
      <section class="card">
        <h2>Score Matrix</h2>
        <p class="most-likely" id="most-likely-score"></p>
        <div id="score-matrix" class="score-matrix-container"></div>
      </section>

      <!-- Match Outcome -->
      <section class="card">
        <h2>Match Outcome</h2>
        <div id="match-outcome" class="outcome-bars"></div>
      </section>

      <!-- Over/Under -->
      <section class="card">
        <h2>Over/Under</h2>
        <table id="ou-results" class="results-table"></table>
      </section>

      <!-- Value Bets -->
      <section class="card">
        <h2>Value Bets</h2>
        <table id="value-bets" class="results-table"></table>
      </section>

      <!-- All Bets Overview -->
      <section class="card">
        <h2>All Bets Overview</h2>
        <table id="all-bets" class="results-table"></table>
      </section>
    </div>

    <!-- Settings (collapsible) -->
    <details class="card">
      <summary><h2 style="display:inline">Settings</h2></summary>
      <div class="setting">
        <label>Dixon-Coles Rho: <span id="rho-value">-0.13</span>
          <span class="help-tip" title="Adjusts probabilities for low-scoring results like 0-0, 1-0, 0-1, 1-1. More negative = stronger correction. Default -0.13 works well for most leagues.">?</span>
        </label>
        <input type="range" id="rho-slider" min="-0.30" max="0" step="0.01" value="-0.13">
      </div>
      <div class="setting">
        <label>Kelly Fraction: <span id="kelly-fraction-value">25%</span>
          <span class="help-tip" title="Controls how aggressively to bet. 25% is conservative and recommended. Higher means larger bets with more risk.">?</span>
        </label>
        <input type="range" id="kelly-fraction-slider" min="0.10" max="1.00" step="0.05" value="0.25">
      </div>
      <div class="setting">
        <label>Bankroll
          <span class="help-tip" title="Your total betting budget. Used to calculate suggested stake amounts.">?</span>
        </label>
        <input type="number" id="bankroll" min="0" step="1" value="1000" placeholder="1000">
      </div>
    </details>

  </div>

  <script type="module" src="js/app.js?v=1775421661"></script>
</body>
</html>
