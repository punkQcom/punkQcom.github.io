<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>BettingPro — Sports Betting Calculator</title>
  <link rel="stylesheet" href="css/style.css?v=1775491853">
</head>
<body>
  <div class="container">
    <header>
      <h1>BettingPro <button type="button" class="help-tip" data-help="about">?</button></h1>
      <p class="subtitle">Sports Betting Probability Calculator</p>
      <span id="last-update" class="last-update"></span>
    </header>

    <!-- Selector Bar -->
    <section class="card selector-bar">
      <div class="selector-row">
        <label>Sport
          <select id="sport-select">
            <option value="football">Football</option>
          </select>
        </label>
        <label>League
          <select id="league-select"></select>
        </label>
        <label class="season-label">Season
          <select id="season-select"></select>
        </label>
        <label>Bookmaker
          <select id="bookmaker-select">
            <option value="veikkaus">Veikkaus</option>
          </select>
        </label>
      </div>
    </section>

    <!-- Match List -->
    <section class="card">
      <h2>Matches <button type="button" class="help-tip" data-help="matches">?</button></h2>
      <div id="match-list" class="match-list">
        <p class="muted">Loading...</p>
      </div>
    </section>

    <!-- Results (hidden until match clicked) -->
    <div id="results" class="results hidden">

      <!-- Selected Match Info -->
      <section class="card">
        <div class="results-header">
          <h2 id="selected-match-title">Match Analysis</h2>
          <div class="results-header-actions">
            <button id="close-results" class="close-btn" title="Close">&times;</button>
          </div>
        </div>
      </section>

      <!-- Score Matrix -->
      <section class="card">
        <h2>Score Matrix <button type="button" class="help-tip" data-help="score-matrix">?</button></h2>
        <p class="most-likely" id="most-likely-score"></p>
        <div id="score-matrix" class="score-matrix-container"></div>
      </section>

      <!-- Match Outcome -->
      <section class="card">
        <h2>Match Outcome <button type="button" class="help-tip" data-help="match-outcome">?</button></h2>
        <div id="match-outcome" class="outcome-bars"></div>
      </section>

      <!-- Over/Under -->
      <section class="card">
        <h2>Over/Under <button type="button" class="help-tip" data-help="over-under">?</button></h2>
        <table id="ou-results" class="results-table"></table>
      </section>

      <!-- Value Bets -->
      <section class="card">
        <h2>Value Bets <button type="button" class="help-tip" data-help="value-bets">?</button></h2>
        <table id="value-bets" class="results-table"></table>
      </section>

      <!-- Fades (Overvalued by Bookmaker) -->
      <section class="card">
        <h2>Fades <button type="button" class="help-tip" data-help="fades">?</button></h2>
        <table id="fades-table" class="results-table"></table>
      </section>

      <!-- Bookmaker Comparison -->
      <section class="card">
        <h2>Bookmaker Comparison <button type="button" class="help-tip" data-help="bookmaker-comparison">?</button></h2>
        <div id="bookmaker-comparison"></div>
      </section>

      <!-- All Bets Overview -->
      <section class="card">
        <h2>All Bets Overview <button type="button" class="help-tip" data-help="all-bets">?</button></h2>
        <table id="all-bets" class="results-table"></table>
      </section>
    </div>

    <!-- Settings (collapsible) -->
    <details class="card">
      <summary><h2 style="display:inline">Settings</h2> <button type="button" class="help-tip" data-help="settings">?</button></summary>
      <div class="setting">
        <label>Market Trust: <span id="market-trust-value">--</span>
          <button type="button" class="help-tip" data-help="market-trust">?</button>
        </label>
        <input type="range" id="market-trust-slider" min="0" max="100" step="1" value="50">
      </div>
      <div class="setting">
        <label>Previous Season: <span id="prev-season-value">--</span>
          <button type="button" class="help-tip" data-help="prev-season">?</button>
        </label>
        <input type="range" id="prev-season-slider" min="0" max="100" step="1" value="50">
      </div>
      <div class="setting">
        <label>Low-Score Correction: <span id="rho-value">-0.13</span>
          <button type="button" class="help-tip" data-help="rho">?</button>
        </label>
        <input type="range" id="rho-slider" min="-0.30" max="0" step="0.01" value="-0.13">
      </div>
      <div class="setting">
        <label>Kelly Fraction: <span id="kelly-fraction-value">25%</span>
          <button type="button" class="help-tip" data-help="kelly">?</button>
        </label>
        <input type="range" id="kelly-fraction-slider" min="0.10" max="1.00" step="0.01" value="0.25">
      </div>
      <div class="setting">
        <label>Bankroll
          <button type="button" class="help-tip" data-help="bankroll">?</button>
        </label>
        <input type="number" id="bankroll" min="0" step="1" value="1000" placeholder="1000">
      </div>
      <div class="setting">
        <label>Min. Edge: <span id="edge-threshold-value">3%</span>
          <button type="button" class="help-tip" data-help="edge-threshold">?</button>
        </label>
        <input type="range" id="edge-threshold-slider" min="0" max="15" step="1" value="3">
      </div>
    </details>

    <!-- Season P/L Simulation -->
    <details class="card">
      <summary><h2 style="display:inline">Season P/L Simulation</h2> <button type="button" class="help-tip" data-help="pl-simulation">?</button></summary>
      <div id="pl-container"></div>
    </details>

    <!-- Prediction Tracker -->
    <details class="card">
      <summary><h2 style="display:inline">Prediction Tracker</h2> <button type="button" class="help-tip" data-help="prediction-tracker">?</button></summary>
      <div id="tracker-container"></div>
    </details>

    <!-- Elo Ratings -->
    <details class="card">
      <summary><h2 style="display:inline">Elo Ratings</h2> <button type="button" class="help-tip" data-help="elo-ratings">?</button></summary>
      <div id="elo-table"></div>
    </details>

    <!-- Help Modal -->
    <div id="help-modal" class="help-modal hidden">
      <div class="help-modal-backdrop"></div>
      <div class="help-modal-content">
        <div class="help-modal-header">
          <h3 id="help-modal-title"></h3>
          <button class="help-modal-close" id="help-modal-close">&times;</button>
        </div>
        <div id="help-modal-body" class="help-modal-body"></div>
      </div>
    </div>

  </div>

  <script type="module" src="js/app.js?v=1775491853"></script>
</body>
</html>
