<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>BettingPro — Sports Betting Calculator</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>BettingPro</h1>
      <p class="subtitle">Sports Betting Probability Calculator</p>
    </header>

    <!-- Update Data -->
    <section class="card update-data-bar">
      <h2>Update Data</h2>
      <div class="update-controls">
        <div id="league-checkboxes" class="league-checkboxes">
          <!-- Populated by JS from cached leagues -->
        </div>
        <button id="update-data-btn" class="update-btn">Update Data</button>
      </div>
      <div id="update-status" class="update-status hidden">
        <span class="spinner"></span>
        <span id="update-message">Updating...</span>
      </div>
      <div id="last-update" class="last-update"></div>
    </section>

    <!-- Data Source -->
    <section class="card">
      <h2>Data Source</h2>
      <select id="data-source">
        <option value="manual">Manual Input</option>
        <option value="league-data">League Data</option>
      </select>
    </section>

    <!-- League/Team Selection (visible when League Data source selected) -->
    <section id="league-team-section" class="card hidden">
      <h2>Select Match</h2>
      <label>League
        <select id="league-select"></select>
      </label>
      <div class="teams-grid">
        <div class="team-column">
          <label>Home Team
            <select id="home-team-select"></select>
          </label>
        </div>
        <div class="team-column">
          <label>Away Team
            <select id="away-team-select"></select>
          </label>
        </div>
      </div>
      <p id="auto-fill-status" class="auto-fill-status"></p>
    </section>

    <!-- Team Stats -->
    <section id="manual-stats-section" class="card">
      <h2>Team Stats</h2>
      <div class="teams-grid">
        <div class="team-column">
          <h3>Home Team</h3>
          <label>Name <input type="text" id="home-name" placeholder="Team A"></label>
          <label>Avg Goals Scored (Home) <input type="number" id="home-scored" step="0.01" min="0" value="1.5"></label>
          <label>Avg Goals Conceded (Home) <input type="number" id="home-conceded" step="0.01" min="0" value="1.1"></label>
        </div>
        <div class="team-column">
          <h3>Away Team</h3>
          <label>Name <input type="text" id="away-name" placeholder="Team B"></label>
          <label>Avg Goals Scored (Away) <input type="number" id="away-scored" step="0.01" min="0" value="1.2"></label>
          <label>Avg Goals Conceded (Away) <input type="number" id="away-conceded" step="0.01" min="0" value="1.3"></label>
        </div>
      </div>
      <label>League Average Goals/Game
        <span class="help-tip" title="The average total goals per game across the entire league this season. Typically between 2.3 and 2.8 for most European leagues.">?</span>
        <input type="number" id="league-avg" step="0.01" min="0" value="2.5">
      </label>
    </section>

    <!-- Bookmaker Odds -->
    <section class="card">
      <h2>Bookmaker Odds <span class="help-tip" title="Enter decimal odds from your bookmaker. Example: 2.10 means you get 2.10x your stake back if you win.">?</span></h2>
      <div class="odds-row">
        <label>Home Win (1) <input type="number" id="odds-home" step="0.01" min="1.01" placeholder="2.10"></label>
        <label>Draw (X) <input type="number" id="odds-draw" step="0.01" min="1.01" placeholder="3.40"></label>
        <label>Away Win (2) <input type="number" id="odds-away" step="0.01" min="1.01" placeholder="3.60"></label>
      </div>
      <div id="margin-display" class="margin-info"></div>

      <h3>Over/Under Lines</h3>
      <div class="ou-grid">
        <div class="ou-row">
          <span class="ou-label">O/U 1.5</span>
          <label>Over <input type="number" id="ou-15-over" step="0.01" min="1.01" placeholder="1.30"></label>
          <label>Under <input type="number" id="ou-15-under" step="0.01" min="1.01" placeholder="3.50"></label>
        </div>
        <div class="ou-row">
          <span class="ou-label">O/U 2.5</span>
          <label>Over <input type="number" id="ou-25-over" step="0.01" min="1.01" placeholder="1.85"></label>
          <label>Under <input type="number" id="ou-25-under" step="0.01" min="1.01" placeholder="2.00"></label>
        </div>
        <div class="ou-row">
          <span class="ou-label">O/U 3.5</span>
          <label>Over <input type="number" id="ou-35-over" step="0.01" min="1.01" placeholder="2.50"></label>
          <label>Under <input type="number" id="ou-35-under" step="0.01" min="1.01" placeholder="1.55"></label>
        </div>
      </div>
    </section>

    <!-- Settings -->
    <section class="card">
      <h2>Settings</h2>
      <div class="setting">
        <label>Dixon-Coles Rho: <span id="rho-value">-0.13</span>
          <span class="help-tip" title="Adjusts probabilities for low-scoring results like 0-0, 1-0, 0-1, 1-1. More negative = stronger correction. Default -0.13 works well for most leagues.">?</span>
        </label>
        <input type="range" id="rho-slider" min="-0.30" max="0" step="0.01" value="-0.13">
      </div>
      <div class="setting">
        <label>Kelly Fraction: <span id="kelly-fraction-value">25%</span>
          <span class="help-tip" title="Controls how aggressively to bet. 25% is conservative and recommended. Higher means larger bets with more risk.">?</span>
        </label>
        <input type="range" id="kelly-fraction-slider" min="0.10" max="1.00" step="0.05" value="0.25">
      </div>
      <div class="setting">
        <label>Bankroll
          <span class="help-tip" title="Your total betting budget. Used to calculate suggested stake amounts.">?</span>
        </label>
        <input type="number" id="bankroll" min="0" step="1" value="1000" placeholder="1000">
      </div>
    </section>

    <!-- Calculate Button -->
    <button id="calculate-btn" class="calculate-btn">Calculate</button>

    <!-- Results (hidden until calculated) -->
    <div id="results" class="results hidden">

      <!-- Score Matrix -->
      <section class="card">
        <h2>Score Matrix</h2>
        <p class="most-likely" id="most-likely-score"></p>
        <div id="score-matrix" class="score-matrix-container"></div>
      </section>

      <!-- Match Outcome -->
      <section class="card">
        <h2>Match Outcome</h2>
        <div id="match-outcome" class="outcome-bars"></div>
      </section>

      <!-- Over/Under -->
      <section class="card">
        <h2>Over/Under</h2>
        <table id="ou-results" class="results-table"></table>
      </section>

      <!-- Value Bets -->
      <section class="card">
        <h2>Value Bets</h2>
        <table id="value-bets" class="results-table"></table>
      </section>

      <!-- All Bets Overview -->
      <section class="card">
        <h2>All Bets Overview</h2>
        <table id="all-bets" class="results-table"></table>
      </section>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
