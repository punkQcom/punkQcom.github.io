<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Kalori — AI Calorie Tracker</title>
    <meta name="description" content="Snap a photo. We tell you the calories. Done." />

    <!-- Anti-FOUC: set data-theme before any render to prevent flash of wrong theme -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('kalori-theme');
          if (stored === 'light' || stored === 'dark') {
            document.documentElement.setAttribute('data-theme', stored);
          } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
            document.documentElement.setAttribute('data-theme', 'light');
          }
          // default (no attribute): dark — matches :root CSS defaults
        } catch (e) {}
      })();
    </script>

    <!-- PWA / theme -->
    <meta name="theme-color" content="#10b981" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kalori" />
